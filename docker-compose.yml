# اجرای کامل پروژه با یک دستور:
#   docker compose up -d --build
#
# قبلش فقط کافیه فایل .env رو از .env.example بسازی و مقادیر واقعی
# (BOT_TOKEN, BOT_USERNAME, GEMINI_API_KEY, DEEPSEEK_API_KEY) رو داخلش پر کنی.
# DATABASE_URL و REDIS_URL نیازی به تغییر ندارن چون به سرویس‌های همین
# فایل اشاره می‌کنن (postgres، redis به‌عنوان hostname داخل شبکه‌ی داکر).

services:
  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:8080"
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_RPM: ${GEMINI_RPM:-100}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DATABASE_URL: postgresql+asyncpg://bluechat:bluechat@postgres:5432/bluechat
      READ_DATABASE_URL: ${READ_DATABASE_URL:-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8080}
      METRICS_PORT: 8081

  worker:
    build: .
    command: python worker.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_RPM: ${GEMINI_RPM:-100}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DATABASE_URL: postgresql+asyncpg://bluechat:bluechat@postgres:5432/bluechat
      READ_DATABASE_URL: ${READ_DATABASE_URL:-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: 8081

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - bluechat_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://apticteam.ir/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - bluechat_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://bluechat:bluechat@postgres:5432/bluechat?sslmode=disable
    volumes:
      - ./pg_custom_queries.yml:/pg_custom_queries.yml:ro
    command: ["--extend.query-path=/pg_custom_queries.yml"]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: bluechat
      POSTGRES_PASSWORD: bluechat
      POSTGRES_DB: bluechat
    volumes:
      - bluechat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluechat -d bluechat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - bluechat_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bluechat_pgdata:
  bluechat_redisdata:
  bluechat_prometheus_data:
  bluechat_grafana_data:
