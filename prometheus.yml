global:
  scrape_interval: 15s

scrape_configs:
  - job_name: bot
    static_configs:
      - targets: ["bot:8081"]

  - job_name: worker
    static_configs:
      - targets: ["worker:8081"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
